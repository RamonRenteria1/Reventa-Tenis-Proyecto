{% extends 'base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <div class="card shadow-lg p-4 border-0 border-top border-dark border-4">

            <div class="card-body">

                <h3 class="text-center fw-bold text-dark mb-4">
                    Iniciar Sesión
                </h3>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">
                            Correo Electrónico
                        </label>

                        <input type="email" name="email" class="form-control border-secondary-subtle"
                            placeholder="nombre@correo.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">
                            Contraseña
                        </label>

                        <input type="password" name="password" class="form-control border-secondary-subtle"
                            placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 rounded-pill fw-bold py-2">

                        Entrar

                    </button>

                </form>

                <p class="text-center mt-3 small">
                    ¿No tienes cuenta?

                    <a href="{{ url_for('registro') }}" class="text-info fw-bold text-decoration-none">
                        Regístrate aquí
                    </a>
                </p>

                <p class="text-center small">
                    <a href="{{ url_for('recuperar') }}" class="text-muted text-decoration-none">
                        ¿Olvidaste tu contraseña?
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
