{% extends "base.html" %}

{% block title %}Registrarse{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-success text-white text-center">
                <h3 class="mb-0">Crear Cuenta</h3>
            </div>

            <div class="card-body">

                <form method="POST" action="/registro">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre</label>

                            <input type="text"
                                name="first_name"
                                class="form-control"
                                placeholder="Juan"
                                required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Apellido</label>

                            <input type="text"
                                name="last_name"
                                class="form-control"
                                placeholder="Treviño"
                                required>
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>

                        <input type="email"
                            name="email"
                            class="form-control"
                            placeholder="usuario@gmail.com"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>

                        <input type="password"
                            name="password"
                            class="form-control"
                            required>
                    </div>

                    <button type="submit"
                            class="btn btn-success w-100">

                        Registrarse
                    </button>

                </form>

                <hr>

                <div class="text-center">
                    <p>¿Ya tienes cuenta?
                        <a href="/inicio">Iniciar Sesión</a>
                    </p>
                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
