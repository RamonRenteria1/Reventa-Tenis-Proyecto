{% extends 'base.html' %}

{% block title %}Registro{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <div class="card shadow-lg p-4 border-0 border-top border-info border-4">

            <div class="card-body">

                <h3 class="text-center fw-bold text-dark mb-4">
                    Crear Cuenta
                </h3>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">
                            Nombre Completo
                        </label>

                        <input type="text" name="nombre" class="form-control border-secondary-subtle"
                            placeholder="Ej. Ramón Rentería" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">
                            Correo Electrónico
                        </label>

                        <input type="email" name="email" class="form-control border-secondary-subtle"
                            placeholder="nombre@correo.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">
                            Nombre de usuario
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">@</span>
                            <input type="text" name="username" class="form-control border-secondary-subtle"
                                placeholder="ramonr" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">
                            Teléfono
                        </label>

                        <input type="text" name="telefono" class="form-control border-secondary-subtle"
                            placeholder="6560000000">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">
                            Foto de perfil URL
                        </label>

                        <input type="text" name="foto_perfil" class="form-control border-secondary-subtle"
                            placeholder="https://...">
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">
                                Contraseña
                            </label>

                            <input type="password" name="password" class="form-control border-secondary-subtle"
                                placeholder="••••••••" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">
                                Confirmar Contraseña
                            </label>

                            <input type="password" name="confirmar_password"
                                class="form-control border-secondary-subtle" placeholder="••••••••" required>
                        </div>

                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">
                            Tipo de Cuenta
                        </label>

                        <select name="tipo" class="form-select border-secondary-subtle" required>

                            <option value="">
                                Selecciona una opción
                            </option>

                            <option value="comprador">
                                Comprador
                            </option>

                            <option value="vendedor">
                                Vendedor
                            </option>

                        </select>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 rounded-pill fw-bold py-2 border-info">
                        Registrarme
                    </button>

                </form>

                <p class="text-center mt-3 small">
                    ¿Ya tienes cuenta?

                    <a href="{{ url_for('login') }}" class="text-info fw-bold text-decoration-none">
                        Inicia sesión aquí
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
