{% extends "base.html" %}

{% block title %}Editar publicación{% endblock %}

{% block content %}

<div class="row justify-content-center mt-4">

    <div class="col-lg-8">

        <div class="card shadow-lg border-0 border-top border-warning border-4">

            <div class="card-body p-4">

                <h2 class="text-center fw-bold mb-4">
                    Editar publicación
                </h2>

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">
                                Nombre
                            </label>

                            <input type="text"
                                   name="nombre"
                                   class="form-control"
                                   value="{{ producto.nombre }}"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">
                                Marca
                            </label>

                            <select name="marca" class="form-select" required>
                                <option value="Nike" {% if producto.marca == "Nike" %}selected{% endif %}>Nike</option>
                                <option value="Adidas" {% if producto.marca == "Adidas" %}selected{% endif %}>Adidas</option>
                                <option value="Puma" {% if producto.marca == "Puma" %}selected{% endif %}>Puma</option>
                                <option value="New Balance" {% if producto.marca == "New Balance" %}selected{% endif %}>New Balance</option>
                            </select>
                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">
                                Modelo
                            </label>

                            <input type="text"
                                   name="modelo"
                                   class="form-control"
                                   value="{{ producto.modelo }}"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">
                                Tipo
                            </label>

                            <select name="tipo" class="form-select" required>
                                <option value="Low" {% if producto.tipo == "Low" %}selected{% endif %}>Low</option>
                                <option value="Mid" {% if producto.tipo == "Mid" %}selected{% endif %}>Mid</option>
                                <option value="High" {% if producto.tipo == "High" %}selected{% endif %}>High</option>
                            </select>
                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">
                                Color
                            </label>

                            <input type="text"
                                   name="color"
                                   class="form-control"
                                   value="{{ producto.color }}"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">
                                Condición
                            </label>

                            <select name="condicion" class="form-select" required>
                                <option value="Nuevo" {% if producto.condicion == "Nuevo" %}selected{% endif %}>Nuevo</option>
                                <option value="Seminuevo" {% if producto.condicion == "Seminuevo" %}selected{% endif %}>Seminuevo</option>
                            </select>
                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold small text-muted">
                                Talla
                            </label>

                            <input type="number"
                                   name="talla"
                                   class="form-control"
                                   value="{{ producto.talla }}"
                                   required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold small text-muted">
                                Stock
                            </label>

                            <input type="number"
                                   name="stock"
                                   class="form-control"
                                   value="{{ producto.stock }}"
                                   min="0"
                                   required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold small text-muted">
                                Precio
                            </label>

                            <input type="number"
                                   name="precio"
                                   class="form-control"
                                   value="{{ producto.precio }}"
                                   min="0"
                                   step="0.01"
                                   required>
                        </div>

                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted">
                            URL de imagen
                        </label>

                        <input type="text"
                               name="imagen"
                               class="form-control"
                               value="{{ producto.imagen }}">
                    </div>

                    <div class="d-flex gap-2">

                        <button type="submit"
                                class="btn btn-warning w-100 rounded-pill fw-bold">
                            Guardar cambios
                        </button>

                        <a href="{{ url_for('tienda_T') }}"
                           class="btn btn-outline-secondary w-100 rounded-pill">
                            Cancelar
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
